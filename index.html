<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Generador de Certificados SAT</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Generador XML SAT</h2>

<form id="frm">

    RFC Contribuyente

    <input
        type="text"
        id="rfcContribuyente">

    <br><br>

    RFC Representante Legal

    <input
        type="text"
        id="rfcRepresentanteLegal">

    <br><br>

    RFC Proveedor

    <input
        type="text"
        id="rfcProveedor">

    <br><br>

    RFC Representante del Proveedor

    <input
        type="text"
        id="rfcRepresentanteLegalProveedor">

    <br><br>

    Fecha

    <input
        type="date"
        id="fecha">

    <br><br>

Folio generado:

<input type="text" id="folio" readonly>

<button type="button" onclick="generarFolioManual()">
    Generar folio
</button>
<br><br>

    Producto

    <input
        type="text"
        id="Producto">

    <br><br>

    RFC Personal

    <input
        type="text"
        id="rfcPersonal">

    <br><br>

    <button type="button"
            onclick="generarXML()">

        Generar XML

    </button>

</form>

<script src="script.js"></script>

</body>

</html>
